[Middleware]

[Middleware.Recovery]
Skip = 3

[Middleware.CORS]
Enable = false
AllowOrigins = ["*"]
AllowMethods = ["GET", "POST", "PUT", "PATCH", "DELETE", "HEAD", "OPTIONS"]
AllowHeaders = ["*"]
MaxAge = 86400
AllowWildcard = true
AllowWebSockets = true
AllowFiles = true

[Middleware.Trace]
RequestHeaderKey = "X-Request-Id"
ResponseTraceKey = "X-Trace-Id"

[Middleware.Logger]
MaxOutputRequestBodyLen = 4096 # bytes
MaxOutputResponseBodyLen = 4096 # bytes

[Middleware.CopyBody]
MaxContentLen = 134217728 # 128MB

[Middleware.Auth]
Disable = false
SkippedPathPrefixes = ["/api/v1/captcha", "/api/v1/captcha/", "/api/v1/login", "/api/v1/refresh-token", "/api/v1/oauth"]
SigningMethod = "HS512" # HS256/HS384/HS512
SigningKey = "${JWT_SIGNING_KEY:XnEsT0S@}" # Secret key
OldSigningKey = "${JWT_OLD_SIGNING_KEY:}" # Old secret key (For change secret key)
Expired = 86400 # seconds

[Middleware.Auth.Store]
Type = "memory" # memory/badger/redis
Delimiter = ":"

[Middleware.Auth.Store.Memory]
CleanupInterval = 60 # seconds

[Middleware.Auth.Store.Badger]
Path = "data/auth"

[Middleware.Auth.Store.Redis]
Addr = "${AUTH_REDIS_ADDR:}" # If empty, then use the same configuration as Storage.Cache.Redis
Username = "${AUTH_REDIS_USERNAME:}"
Password = "${AUTH_REDIS_PASSWORD:}"
DB = 2

[Middleware.RateLimiter]
Enable = false
Period = 10 # seconds
MaxRequestsPerIP = 1000
MaxRequestsPerUser = 500

[Middleware.RateLimiter.Store]
Type = "memory" # memory/redis

[Middleware.RateLimiter.Store.Memory]
Expiration = 3600
CleanupInterval = 60

[Middleware.RateLimiter.Store.Redis]
Addr = "${RATELIMITER_REDIS_ADDR:}" # If empty, then use the same configuration as Storage.Cache.Redis
Username = "${RATELIMITER_REDIS_USERNAME:}"
Password = "${RATELIMITER_REDIS_PASSWORD:}"
DB = 10

[Middleware.Casbin]
Disable = false
SkippedPathPrefixes = ["/api/v1/captcha", "/api/v1/captcha/", "/api/v1/login", "/api/v1/current/", "/api/v1/oauth"]
LoadThread = 2
AutoLoadInterval = 3 # seconds
ModelFile = "rbac_model.conf"
GenPolicyFile = "gen_rbac_policy.csv"
